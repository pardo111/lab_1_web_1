<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Empleo</title>
    <link rel="stylesheet" href="./resources/css/bootstrap.min.css">
    <script src="./resources/js/bootstrap.bundle.min.js"></script>
    <script src="./resources/js/jquery.min.js"></script>
        <script src="./resources/js/sweetalert2@11.js"></script>

</head>

<body class="bg-light">
    <section class="vh-100 d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-5 text-black">

                    <div class="card shadow border-0 p-4 bg-white rounded-4">
                        
                        <form action="/enviar-solicitud" method="POST">
                            
                            <div class="text-center mb-4">
                                <h3 class="fw-bold">Solicitud de Empleo</h3>
                                <p class="text-muted">Completa tus datos para postularte</p>
                            </div>

                            <hr class="mb-4 opacity-25">

                            <div class="mb-3">
                                <label class="form-label fw-bold" for="nombre">Nombre Completo</label>
                                <div class="input-group">
                                    <input type="text" id="nombre" name="nombre" 
                                        class="form-control" 
                                        placeholder="Ej: Juan Pérez"
                                        required />
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold" for="edad">Edad</label>
                                    <input type="number" id="edad" name="edad" 
                                        class="form-control" 
                                        min="15" max="75"
                                        placeholder="00"
                                        required />
                                </div>

                                <div class="col-md-8 mb-3">
                                    <label class="form-label fw-bold" for="sueldo">Sueldo Pretendido</label>
                                    <div class="input-group">
                                        <span class="input-group-text">$</span>
                                        <input type="number" id="sueldo" name="sueldo" 
                                            class="form-control" 
                                            step="0.01" min="0"
                                            placeholder="0.00"
                                            required />
                                    </div>
                                </div>
                            </div>

                         

                            <div class="d-grid">
                                <button class="btn btn-success btn-lg fw-bold shadow-sm" id="submit" type="button">
                                  Procesar Aplicación
                                </button>
                            </div>

                        </form>

                    </div>
 

                </div>
            </div>
        </div>
    </section>

</body>

<script src="./resources/js/index.js"></script>
</html>
